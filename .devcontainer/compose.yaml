version: "3.3"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/PaiBudgetBook:cached
    command: sleep infinity
    depends_on:
      - db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pai_budget_book_development
      DB_HOST: db

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pai_budget_book_development
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
